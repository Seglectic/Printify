printers:
  zebra:
    displayName: "Zebra Label Printer"
    printMode: "driver"
    driverName: "Zebra450"
    size: "4x6"
    units: "inch"
    density: "200"
    acceptedKinds: [ "pdf", "image", "zip" ]
    monochrome: true
    monochromeBit: 1
    monochromeDither: "floydsteinberg"
    labelBuilder: true
    bundleCopies: true

  brotherLaser:
    displayName: "Brother Laser Printer"
    printMode: "driver"
    driverName: "Brother2360DUSB"
    size: "8.5x11"
    units: "inch"
    density: "300"
    acceptedKinds: [ "pdf", "image" ]
    labelBuilder: true
    bundleCopies: false

  dymoLabel:
    displayName: "Dymo Label Maker"
    printMode: "driver"
    driverName: "DYMO4XLUSB"
    size: "2.125x1"
    units: "inch"
    density: "200"
    acceptedKinds: [ "image" ]
    labelBuilder: true
    bundleCopies: true
