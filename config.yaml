# ╭───────────────────────────────────────────╮
# │  Example printer config                   │
# │  printers:                                │
# │    examplePrinter:                        │
# │      displayName: "Shipping Labels"       │
# │      driverName: "My Printer Driver"      │
# │      printMode: "cli"                     │
# │      acceptedKinds: ["pdf", "image"]      │
# │      labelBuilder: false                  │
# │      bundleImageCopies: false             │
# │      pxSize: "800x1200"                   │
# │      density: "300"                       │
# │      linuxPrintMode: "lp"                 │
# │      linuxDriverName: "My Linux Queue"    │
# │      cliCommand: "python"                 │
# │      cliArgs: ["printChan.py", "{file}"]  │
# ╰───────────────────────────────────────────╯

port: 8020
testing: true

printers:
  zebra:
    displayName: "Zebra Label Printer"
    driverName: "Zebra450"
    printMode: "pdfToPrinter"
    linuxPrintMode: "lp"
    acceptedKinds: ["pdf", "image", "zip"]
    labelBuilder: true
    bundleImageCopies: false
    pxSize: "800x1200"
    density: "300"

  brotherLaser:
    displayName: "Brother Laser Printer"
    driverName: "Brother2360DUSB"
    printMode: "lp"
    acceptedKinds: ["pdf", "image"]
    labelBuilder: false
    bundleImageCopies: false
    pxSize: null
    density: null

  dymoLabel:
    displayName: "Dymo Label Maker"
    driverName: "DYMO4XLUSB"
    printMode: "pdfToPrinter"
    linuxPrintMode: "lp"
    acceptedKinds: ["image"]
    labelBuilder: true
    bundleImageCopies: true
    pxSize: "425x200"
    density: "200"
