# ╭─────────────────────────────────────────╮
# │  config.yaml                            │
# │  Each key under "printers" defines one  │
# │  printer object and its upload/print    │
# │  capabilities.                          │
# ╰─────────────────────────────────────────╯

# ╭──────────────────╮
# │  Global Options  │
# ╰──────────────────╯
# assistant: choose the desktop mascot for status text and boot chatter
# Available assistants: none, Bonzi, Clippy, F1, Genie, Genius, Links,
# Merlin, Peedy, Rocky, Rover
port: 8020
testing: true
assistant: Links
# imPath: ""
clientPlugins:
  - emu

clientPluginConfig:
  emu:
    rom: "tetris.gb"
    save: "tetris.sav"
    triggerCode: "123"

# ╭───────────────────────────────────────────────────────────╮
# │  Printer options                                          │
# │  - displayName: UI label shown in the app                 │
# │  - printMode: "driver" or "cli"                           │
# │      "driver" uses "lp" on linux and pdf-to-printer       │
# │       elsewhere                                           │
# │  - driverName: printer / queue name for                   │
# │    driver mode                                            │
# │  - size: print target size in decimal form,               │
# │    such as "4x6" or "3.8x5.8"                             │
# │    or "tape" for variable-length tape labels              │
# │  - units: inch, mm, cm, or px                             │
# │  - density: ImageMagick density used to convert           │
# │    physical size to effective pixels                      │
# │  - tapes: supported tape widths in mm for                 │
# │    size: "tape" printers                                  │
# │  - defaultTape: optional default tape width               │
# │  - output: required for cli mode; "png" or "pdf"          │
# │  - acceptedKinds: any of pdf, image, zip                  │
# │  - monochrome: force image prep to black/white            │
# │  - monochromeBit: 1 for true black/white output           │
# │    or 8 for grayscale                                     │
# │  - monochromeDither: floydsteinberg,                      │
# │    riemersma, or none                                     │
# │  - labelBuilder: enables the label builder                │
# │  - bundleCopies: bundle image copies into                 │
# │    one PDF before printing                                │
# │  - cliCommand: command used for cli mode                  │
# │  - cliArgs: args for cli mode; supports                   │
# │    the {file}, {tapeWidthMm}, and {lengthMm} placeholders │
# │  - tape width controls print height; length is job-driven │
# ╰───────────────────────────────────────────────────────────╯

#  Example printer object with every supported key.         
#  Uncomment and adapt as needed.                           
#                                                           
#  printers:                                                
#    examplePrinter:                                        
#      displayName: "Shipping Labels"                       
#      printMode: "driver"                                  
#      driverName: "My Printer Driver"                      
#      size: "4x6"                                          
#      units: "inch"                                        
#      density: "300"                                       
#      acceptedKinds: ["pdf", "image", "zip"]               
#      labelBuilder: true                                   
#      bundleCopies: false                                  
#      cliCommand: "python"                                 
#      cliArgs: ["printChan.py", "{file}"]                  


printers:
  ptouch:
    displayName: "P-Touch Cube"
    printMode: "cli"
    cliCommand: "ptouch-print"
    cliArgs: [ "--image", "{file}" ]
    output: "png"
    size: "tape"
    tapes: [ 6, 9, 12, 18, 24, 36 ]
    defaultTape: 24
    density: "135"
    acceptedKinds: [ "image" ]
    monochrome: true
    monochromeBit: 1
    monochromeDither: "floydsteinberg"
    labelBuilder: true
    bundleCopies: false

  zebra:
    displayName: "Zebra Label Printer"
    printMode: "driver"
    driverName: "Zebra450"
    size: "4x6"
    units: "inch"
    density: "200"
    acceptedKinds: [ "pdf", "image", "zip" ]
    monochrome: true
    monochromeBit: 1
    monochromeDither: "floydsteinberg"
    labelBuilder: true
    bundleCopies: true

  brotherLaserHome:
    displayName: "Home Brother Laser Printer"
    printMode: "driver"
    driverName: "HL-L2380DW_series"
    size: "8.5x11"
    units: "inch"
    density: "300"
    acceptedKinds: [ "pdf", "image" ]
    labelBuilder: true
    bundleCopies: false

  brotherLaserWork:
    displayName: "Work Brother Laser Printer"
    printMode: "driver"
    driverName: "Brother2360DUSB"
    size: "8.5x11"
    units: "inch"
    density: "300"
    acceptedKinds: [ "pdf", "image" ]
    labelBuilder: true
    bundleCopies: false

  dymoLabel:
    displayName: "Dymo Label Maker"
    printMode: "driver"
    driverName: "DYMO4XLUSB"
    size: "2.125x1"
    units: "inch"
    density: "200"
    acceptedKinds: [ "image" ]
    labelBuilder: true
    bundleCopies: true
