# ╭─────────────────────────────────────────╮
# │  config.yaml                            │
# │  Each key under "printers" defines one  │
# │  printer object and its upload/print    │
# │  capabilities.                          │
# ╰─────────────────────────────────────────╯

# ╭──────────────────╮
# │  Global Options  │
# ╰──────────────────╯
# Clippy: enable the assistant mascot and route status text to him
port: 8020
testing: true
clippy: true
# imPath: ""

# ╭───────────────────────────────────────────────────────────╮
# │  Printer options                                          │
# │  - displayName: UI label shown in the app                 │
# │  - printMode: "driver" or "cli"                           │
# │      "driver" uses "lp" on linux and pdf-to-printer       │
# │       elsewhere                                           │
# │  - driverName: printer / queue name for                   │
# │    driver mode                                            │
# │  - size: print target size in decimal form,               │
# │    such as "4x6" or "3.8x5.8"                             │
# │  - units: inch, mm, cm, or px                             │
# │  - density: ImageMagick density used to convert           │
# │    physical size to effective pixels                      │
# │  - acceptedKinds: any of pdf, image, zip                  │
# │  - labelBuilder: enables the label builder                │
# │  - bundleCopies: bundle image copies into                 │
# │    one PDF before printing                                │
# │  - cliCommand: command used for cli mode                  │
# │  - cliArgs: args for cli mode; supports                   │
# │    the {file} placeholder                                 │
# ╰───────────────────────────────────────────────────────────╯

#  Example printer object with every supported key.         
#  Uncomment and adapt as needed.                           
#                                                           
#  printers:                                                
#    examplePrinter:                                        
#      displayName: "Shipping Labels"                       
#      printMode: "driver"                                  
#      driverName: "My Printer Driver"                      
#      size: "4x6"                                          
#      units: "inch"                                        
#      density: "300"                                       
#      acceptedKinds: ["pdf", "image", "zip"]               
#      labelBuilder: true                                   
#      bundleCopies: false                                  
#      cliCommand: "python"                                 
#      cliArgs: ["printChan.py", "{file}"]                  


printers:
  zebra:
    displayName: "Zebra Label Printer"
    printMode: "driver"
    driverName: "Zebra450"
    size: "4x6"
    units: "inch"
    density: "300"
    acceptedKinds: ["pdf", "image", "zip"]
    labelBuilder: true
    bundleCopies: true

  brotherLaser:
    displayName: "Brother Laser Printer"
    printMode: "driver"
    driverName: "Brother2360DUSB"
    size: null
    units: null
    density: null
    acceptedKinds: ["pdf", "image"]
    labelBuilder: false
    bundleCopies: false

  dymoLabel:
    displayName: "Dymo Label Maker"
    printMode: "driver"
    driverName: "DYMO4XLUSB"
    size: "2.125x1"
    units: "inch"
    density: "200"
    acceptedKinds: ["image"]
    labelBuilder: true
    bundleCopies: true
