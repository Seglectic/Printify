# ╭────────────────────────────────────────────────────────────────────────────────────────╮
# │  Global Options                                                                        │
# ╰────────────────────────────────────────────────────────────────────────────────────────╯
# assistant: choose the desktop mascot for status text and boot chatter
#   Available assistants: none, Bonzi, Clippy, F1, Genie, Genius, Links, Merlin, Peedy, Rocky, Rover
port: 8020
testing: true
assistant: none
fileWatchReload: true
# imPath: ""

# ╭────────────────────────────────────────────────────────────────────────────────────────╮
# │  Printer Options                                                                       │
# │  - displayName: UI label shown in the app.                                             │
# │  - printMode: "driver" or "cli"; driver uses "lp" on Linux, pdf-to-printer elsewhere.  │
# │  - driverName: printer / queue name for driver mode.                                   │
# │  - size: print target size, such as "4x6", "3.8x5.8", or "tape" for variable labels.   │
# │  - units: inch, mm, cm, or px.                                                         │
# │  - density: ImageMagick density used to convert physical size to effective pixels.     │
# │  - tapes: supported tape widths in mm for size: "tape" printers.                       │
# │  - defaultTape: optional default tape width.                                           │
# │  - output: required for cli mode; "png" or "pdf".                                      │
# │  - acceptedKinds: any of pdf, image, zip.                                              │
# │  - monochrome: force image prep to black/white.                                        │
# │  - monochromeBit: 1 for true black/white output or 8 for grayscale.                    │
# │  - monochromeDither: floydsteinberg, riemersma, or none.                               │
# │  - labelBuilder: enables the label builder.                                            │
# │  - bundleCopies: bundle image copies into one PDF before printing.                     │
# │  - cliCommand: command used for cli mode.                                              │
# │  - cliArgs: args for cli mode; supports {file}, {tapeWidthMm}, and {lengthMm}.         │
# │  - tape width controls print height; length is job-driven.                             │
# ╰────────────────────────────────────────────────────────────────────────────────────────╯

